name: Morning Claude

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  morning-chat:
    runs-on: ubuntu-latest
    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Chat with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude -p "hi" --model haiku
