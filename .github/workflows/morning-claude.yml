name: Morning Claude

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  morning-chat:
    runs-on: ubuntu-latest
    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Chat with Claude
        id: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TZ: Asia/Seoul
        run: |
          sudo locale-gen ko_KR.UTF-8
          TODAY=$(LC_TIME=ko_KR.UTF-8 date '+%Y년 %m월 %d일 %A %H:%M')
          RESPONSE=$(claude -p "just say 'a'" --model claude-haiku-4-5-20251001)
          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "date=${TODAY}" >> $GITHUB_OUTPUT

      - name: Send to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLAUDE_RESPONSE: ${{ steps.claude.outputs.response }}
          CLAUDE_DATE: ${{ steps.claude.outputs.date }}
        run: |
          jq -n \
            --arg date "$CLAUDE_DATE" \
            --arg resp "$CLAUDE_RESPONSE" \
            '{content: "⚡ **클로드 워밍업 완료**\n📅 \($date)\n\n\($resp)"}' \
          | curl -H "Content-Type: application/json" -d @- $WEBHOOK_URL
